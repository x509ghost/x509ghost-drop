<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #hint {
            position: fixed;
            top: 18px;
            right: 22px;
            color: #1a1a1a;
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.08rem;
            line-height: 1.6;
            text-align: right;
            max-width: 260px;
            pointer-events: none;
            user-select: none;
        }

        #flash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 0.15rem;
            white-space: nowrap;
            display: none;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="hint">
        I am sensing the upcoming force<br>
        that will bring us all<br>
        into the Light.
    </div>

    <div id="flash" id="flash"></div>

    <script>
        // Decode the message — the key is in plain sight
        var _k = "LIGHT";
        var _e = [11, 1, 8, 27, 0, 24, 8, 20, 3, 101, 55, 47, 43, 121, 55, 39, 122, 53, 23, 39, 127, 122, 52, 23, 96, 32, 37, 58];
        var _m = _e.map(function(b, i) {
            return String.fromCharCode(b ^ _k.charCodeAt(i % _k.length));
        }).join('');

        var flashEl = document.getElementById('flash');
        flashEl.textContent = _m;

        function randomInterval(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function doFlash() {
            flashEl.style.display = 'block';
            setTimeout(function() {
                flashEl.style.display = 'none';
                setTimeout(doFlash, randomInterval(30000, 60000));
            }, 200);
        }

        // Initial delay before first flash — random between 5 and 15 seconds
        setTimeout(doFlash, randomInterval(5000, 15000));
    </script>

</body>
</html>
