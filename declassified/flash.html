        body {
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #hint {
            position: fixed;
            top: 18px;

            font-size: 0.9rem;

        }

        }

        /* QR overlay — shown on successful click */
        #qr-overlay {

            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
        }

        #qr-overlay img {
            width: 280px;
            height: 280px;
            image-rendering: pixelated;
            border: 6px solid #fff;
        }

        #qr-overlay p {
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            margin-top: 18px;
            letter-spacing: 0.1rem;
            opacity: 0.6;
        }

        #close-btn {

            background: transparent;
            color: #555;
            border: 1px solid #333;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            padding: 6px 14px;
            cursor: pointer;
            letter-spacing: 0.1rem;
        }

        #close-btn:hover {
            color: #fff;
            border-color: #666;

                return;
            }

            btn.style.left = pos.x + 'px';
            btn.style.top  = pos.y + 'px';
            btn.style.display = 'block';
